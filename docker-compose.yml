services:
  stock-management-ai:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    volumes:
      - ./prediction_results:/app/prediction_results
      - ./buat-maen2-aja-9223ad2c5ec3_private_key_n8n_skripsi.json:/app/credentials:ro  # Mount credentials directory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    